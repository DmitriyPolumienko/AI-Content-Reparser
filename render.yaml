services:
  - type: web
    name: v2post-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1
      - key: ALLOWED_ORIGINS
        value: "https://v2post.com,https://dev.v2post.com"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: WEBSHARE_PROXY_LIST
        sync: false
      - key: WEBSHARE_PROXY_HOST
        value: p.webshare.io
      - key: WEBSHARE_PROXY_PORT
        value: "80"
      - key: WEBSHARE_PROXY_USERNAME
        sync: false
      - key: WEBSHARE_PROXY_PASSWORD
        sync: false
      - key: WEBSHARE_MAX_SESSION_ID
        value: "215084"
      - key: REDIS_URL
        sync: false
    healthCheckPath: /health

  # Background worker – processes Redis queue jobs asynchronously
  - type: worker
    name: v2post-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: rq worker transcripts --url $REDIS_URL
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: WEBSHARE_PROXY_HOST
        value: p.webshare.io
      - key: WEBSHARE_PROXY_PORT
        value: "80"
      - key: WEBSHARE_PROXY_USERNAME
        sync: false
      - key: WEBSHARE_PROXY_PASSWORD
        sync: false
      - key: WEBSHARE_MAX_SESSION_ID
        value: "215084"
      - key: REDIS_URL
        sync: false
