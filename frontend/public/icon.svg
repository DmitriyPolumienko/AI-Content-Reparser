<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>
  <!-- Play button triangle -->
  <polygon points="16,12 38,24 16,36" fill="url(#play)"/>
  <!-- Horizontal lines (content lines) -->
  <rect x="10" y="19" width="14" height="2.5" rx="1.25" fill="white" opacity="0.6"/>
  <rect x="10" y="24" width="10" height="2.5" rx="1.25" fill="white" opacity="0.5"/>
  <rect x="10" y="29" width="12" height="2.5" rx="1.25" fill="white" opacity="0.4"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="play" x1="16" y1="12" x2="38" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
</svg>
